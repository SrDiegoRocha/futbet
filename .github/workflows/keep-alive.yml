name: keep-alive

# Mantém o Web Service free do Render acordado (ele dorme após ~15 min ocioso).
# Pinga o /actuator/health a cada 10 min.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # permite rodar manualmente pela aba Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS --max-time 90 --retry 3 --retry-delay 10 \
            "${{ secrets.RENDER_HEALTH_URL }}"
