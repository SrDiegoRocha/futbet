services:
  postgres:
    image: postgres:16-alpine
    container_name: reidopitaco-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reidopitaco}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - reidopitaco_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-reidopitaco}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  reidopitaco_pg_data:
    name: reidopitaco_pg_data
