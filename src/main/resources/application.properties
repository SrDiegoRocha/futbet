spring.application.name=futbet

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/futbet}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

futbet.security.jwt.secret=${JWT_SECRET:change-me-in-production-this-is-a-long-development-secret-key-with-256-bits-minimum}
futbet.security.jwt.access-token-expiration-minutes=15
futbet.security.jwt.refresh-token-expiration-days=7
futbet.security.jwt.issuer=futbet
